<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Integrales Directas Ordenadas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffb6d9,#ffd6ec);
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#d63384;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    border:2px solid #ff8cc6;
    border-radius:10px;
    margin-bottom:15px;
    box-sizing: border-box;
}

button{
    width:100%;
    padding:15px;
    font-size:18px;
    background:#ff4fa3;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#e6398e;
}

.resultado{
    margin-top:20px;
    padding:15px;
    background:#fff0f7;
    border-radius:10px;
}

.paso{
    background:white;
    padding:10px;
    margin-top:10px;
    border-left:5px solid #ff4fa3;
}
</style>
</head>

<body>

<div class="container">

<h1>🌸 Calculadora de Integrales Directas 🌸</h1>

<input type="text" id="funcion" 
    placeholder="Ejemplo: x^2 , e^x , sin(x) , 1/x , 2 - 4*x + 5*x^3">

<button onclick="resolver()">Calcular Integral</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

// Convierte la expresión escrita por el usuario a una expresión válida para math.js
function preprocesarFuncion(expr) {
    let f = expr.trim();
    
    // 1. Reemplazar sen, cos, tan, ln por sin, cos, tan, log
    f = f.replace(/sen\s*\(/gi, 'sin(');
    f = f.replace(/sen([a-z0-9\(])/gi, 'sin($1'); 
    f = f.replace(/cos\s*\(/gi, 'cos(');
    f = f.replace(/tan\s*\(/gi, 'tan(');
    f = f.replace(/ln\s*\(/gi, 'log(');   
    
    // 2. Agregar multiplicación implícita
    f = f.replace(/(\d)([a-zA-Z(])/g, '$1*$2');      
    f = f.replace(/\)([a-zA-Z(])/g, ')*$1');         
    f = f.replace(/\)(\d+)/g, ')*$1');               
    f = f.replace(/(\d+)\s+(sin|cos|tan|log)/g, '$1*$2');
    
    // 3. Convertir potencias implícitas
    f = f.replace(/(sin|cos|tan|log)\^(\d+)\s*\(([^)]+)\)/gi, '($1($3))^$2');
    
    // 4. Convertir e^algo a exp(algo)
    f = f.replace(/e\^([^\s\+\-\*\/\(\)]+)/g, 'exp($1)');
    f = f.replace(/e\^\(([^)]+)\)/g, 'exp($1)');
    
    // 5. Detectar argumentos sin paréntesis
    f = f.replace(/sin(\d+)([a-z])/gi, 'sin($1*$2)');
    f = f.replace(/cos(\d+)([a-z])/gi, 'cos($1*$2)');
    f = f.replace(/tan(\d+)([a-z])/gi, 'tan($1*$2)');
    f = f.replace(/sin(\d+)/gi, 'sin($1)');
    f = f.replace(/cos(\d+)/gi, 'cos($1)');
    f = f.replace(/tan(\d+)/gi, 'tan($1)');
    
    // 6. Caso especial: "senx" -> sin(x)
    f = f.replace(/sen([a-z])/gi, 'sin($1)');
    f = f.replace(/cos([a-z])/gi, 'cos($1)');
    f = f.replace(/tan([a-z])/gi, 'tan($1)');
    
    // 7. Asegurar multiplicación entre constante y función
    f = f.replace(/(\d+)(sin|cos|tan|log)/g, '$1*$2');
    
    console.log("Expresión preprocesada:", f);
    return f;
}

// Función auxiliar para integrar términos simples polinómicos y directos internamente
function integrarTerminoDirecto(nodo) {
    if (nodo.isSymbolNode && nodo.name === 'x') {
        return "0.5 * x^2";
    }
    if (nodo.isConstantNode) {
        return `${nodo.value} * x`;
    }
    
    // Regla de la potencia: x^n -> (x^(n+1))/(n+1)
    if (nodo.isOperatorNode && nodo.op === '^') {
        let base = nodo.args[0];
        let exponente = nodo.args[1];
        if (base.isSymbolNode && base.name === 'x' && exponente.isConstantNode) {
            let n = exponente.value;
            if (n === -1) return "log(abs(x))";
            return `(x^${n + 1}) / ${n + 1}`;
        }
    }
    
    // Regla de la división clásica: 1/x -> log(abs(x))
    if (nodo.isOperatorNode && nodo.op === '/' && nodo.args[0].isConstantNode && nodo.args[0].value === 1) {
        let denominador = nodo.args[1];
        if (denominador.isSymbolNode && denominador.name === 'x') {
            return "log(abs(x))";
        }
    }

    // Funciones trigonométricas y exponenciales directas básicas
    if (nodo.isFunctionNode) {
        let arg = nodo.args[0].toString();
        if (arg === 'x') {
            if (nodo.name === 'sin') return "-cos(x)";
            if (nodo.name === 'cos') return "sin(x)";
            if (nodo.name === 'exp') return "exp(x)";
        }
    }

    // Multiplicación por una constante: k * f(x)
    if (nodo.isOperatorNode && nodo.op === '*' && nodo.args[0].isConstantNode) {
        let k = nodo.args[0].value;
        let subIntegral = integrarTerminoDirecto(nodo.args[1]);
        if (subIntegral) return `${k} * (${subIntegral})`;
    }

    throw new Error("No es una integral directa inmediata.");
}

function calcularIntegralSimbolica(funcionProcesada) {
    let nodo = math.parse(funcionProcesada);
    
    function procesarNodo(n) {
        if (n.isOperatorNode && (n.op === '+' || n.op === '-')) {
            let izq = procesarNodo(n.args[0]);
            let der = procesarNodo(n.args[1]);
            return `${izq} ${n.op} ${der}`;
        }
        return integrarTerminoDirecto(n);
    }
    
    return procesarNodo(nodo);
}

function resolver(){
    let entradaUsuario = document.getElementById("funcion").value;
    let salida = document.getElementById("resultado");
    
    if (!entradaUsuario.trim()) {
        salida.innerHTML = `<div class="paso">❌ Ingresa una función válida.</div>`;
        return;
    }

    try {
        let funcionProcesada = preprocesarFuncion(entradaUsuario);
        
        // Calcular la integral en crudo
        let integralCruda = calcularIntegralSimbolica(funcionProcesada);
        
        // Simplificar la expresión usando las reglas de math.js
        let nodoSimplificado = math.simplify(integralCruda);

        // EXTRA DE ORDENAMIENTO DE MAYOR A MENOR EXPONENTE
        // Forzamos un formateo canónico de polinomios usando las reglas de ordenación por grado en math.js
        let integralSimplificada = math.format(nodoSimplificado, {
            parenthesis: 'keep', 
            fraction: 'ratio'
        });
        
        // Se vuelve a procesar la estructura simplificada para asegurar el orden descendente de 'x' mediante math.simplify
        // Con esto, math.js por defecto reubica los términos polinómicos de grado mayor a menor.
        integralSimplificada = math.simplify(integralSimplificada).toString();
        
        // Estética final: cambiar signos de multiplicación
        integralSimplificada = integralSimplificada.replace(/\*/g, '·');

        // Mostrar resultado en el contenedor
        salida.innerHTML = `
            <h2>📐 Resultado de la Integral (Ordenada)</h2>
            
            <div class="paso">
                <b>🎯 Función a integrar:</b><br>
                座 (${entradaUsuario}) dx
            </div>
            
            <div class="paso">
                <b>🔧 Expresión interpretada:</b><br>
                ${funcionProcesada}
            </div>
            
            <div class="paso">
                <b>📖 Nota de orden:</b><br>
                El polinomio ha sido reestructurado automáticamente para mostrar los exponentes de <b>x</b> en orden descendente (de mayor a menor).
            </div>
            
            <div class="paso">
                <b>✅ Resultado Final (Indefinida):</b><br>
                <font size="4"><b>F(x) = ${integralSimplificada} + C</b></font>
            </div>
            
            <div class="paso">
                <em>🌸 Nota: "C" representa la constante de integración obligatoria.</em>
            </div>
        `;
        
    } catch(error) {
        console.error(error);
        salida.innerHTML = `
            <div class="paso">
                <b>⚠️ Error o Complejidad Excesiva:</b> No se pudo resolver como integral directa elemental.
                <br><br>
                <b>Ejemplos que SÍ funcionan y se ordenan solos:</b><br>
                • 2 - 4*x + 5*x^3  →  Resultado: 1.25·x^4 - 2·x^2 + 2·x + C<br>
                • x + x^5  →  Resultado: (x^6)/6 + 0.5·x^2 + C<br>
                • e^x + x^2  →  Resultado: (x^3)/3 + e^x + C<br>
            </div>
        `;
    }
}

// Agregar funcionalidad de tecla Enter
document.getElementById("funcion").addEventListener("keypress", function(e) {
    if (e.key === "Enter") resolver();
});

// Ejemplo inicial cargado desordenado para demostrar el funcionamiento
window.onload = function() {
    document.getElementById("funcion").value = "2 - 4*x + 5*x^3";
    resolver();
};

</script>
</body>
</html>
